<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华联中学 - 学生评语报告</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
body{font-family:'Outfit','Inter',system-ui,sans-serif;background:#f8fafc}
.card{max-width:800px;margin:1.5rem auto;background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.header-row{display:flex;align-items:center;gap:1rem;border-bottom:2px solid #1a56db;padding-bottom:1rem;margin-bottom:1.5rem}
.header-row img{width:64px;height:64px;border-radius:50%;object-fit:cover;background:#e5e7eb}
@media print{body{background:#fff}.card{box-shadow:none;padding:0}button{display:none!important}}
</style>
</head>
<body>
<div class="card" id="content"><div style="text-align:center;padding:3rem">⏳ 加载中...</div></div>
<script>
(function(){
var code=new URLSearchParams(window.location.search).get('code');
if(!code){document.getElementById('content').innerHTML='<div style="text-align:center;padding:3rem;color:#dc2626">❌ 无效链接 — Invalid Link</div>';return}
var codes=JSON.parse(localStorage.getItem('parent_codes_2026')||'{}');
var studentId=null;
Object.keys(codes).forEach(function(k){if(codes[k]===code)studentId=k});
if(!studentId){document.getElementById('content').innerHTML='<div style="text-align:center;padding:3rem;color:#dc2626">❌ 访问码无效 — Invalid Code</div>';return}
fetch('class-config.json').then(function(r){return r.json()}).then(function(cfg){
var st=(cfg.students||[]).find(function(s){return s.studentId===studentId});
if(!st){document.getElementById('content').innerHTML='<div style="text-align:center;padding:3rem">学生资料未找到</div>';return}
var yr=cfg.currentAcademicYear||'2026',subs=cfg.subjects||[];
var html='<div class="header-row"><img src="photos/'+st.studentId+'.jpg" onerror="this.style.display=\'none\'" alt=""><div><h2 style="margin:0">'+st.nameZh+'</h2><p style="color:#6b7280;margin:0">'+st.nameEn+'</p><p style="font-size:0.85rem;color:#9ca3af;margin:0">班级: 初二爱 | 学号: '+st.studentId+' | '+(st.gender==='M'?'男':'女')+'</p></div></div>';
html+='<table><thead><tr><th>#</th><th>科目</th><th>评语</th><th>状态</th></tr></thead><tbody>';
subs.forEach(function(sub,i){var k='r_'+yr+'_'+st.studentId+'_'+sub.code,saved=JSON.parse(localStorage.getItem(k)||'null');var fb=saved?saved.feedback:'',done=saved&&saved.isComplete===1;html+='<tr><td>'+(i+1)+'</td><td>'+sub.emoji+' '+sub.name+'</td><td>'+(fb||'<span style="color:#9ca3af">— 暂无 —</span>')+'</td><td><span style="color:'+(done?'#16a34a':'#9ca3af')+'">'+(done?'✅ 已完成':'⏳ 待完成')+'</span></td></tr>'});
html+='</tbody></table><p style="text-align:center;font-size:0.75rem;color:#9ca3af;margin-top:1.5rem">华联中学 · 初二爱班 · 2026年度学生评语报告</p><div style="text-align:center;margin-top:1rem"><button onclick="window.print()">🖨️ 打印</button></div>';
document.getElementById('content').innerHTML=html}).catch(function(){document.getElementById('content').innerHTML='<div style="text-align:center;padding:3rem;color:#dc2626">加载失败，请重试</div>'})})();
</script>
</body>
</html>
